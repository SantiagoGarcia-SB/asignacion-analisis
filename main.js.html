<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

<script>
let datosGlobales = [];
let yaSeIntentoAsignar = false;
let estadoGlobalAsesor = "INACTIVO";
let tipoSolicitudActual = "";
let cargaInicialHecha = false;
var _timerFinTurno = null;
var _pollingTablaVacia = null;
var _POLLING_INTERVALO_MS = 2 * 60 * 1000;
var _pollingEnCurso = false;

function _mostrarBannerPolling(visible) {
  var banner = document.getElementById('bannerPolling');
  if (!banner) return;
  if (visible) {
    banner.classList.remove('d-none');
    banner.style.display = 'flex';
  } else {
    banner.classList.add('d-none');
    banner.style.display = 'none';
  }
}

function _actualizarHoraPolling() {
  var el = document.getElementById('pollingUltimaBusqueda');
  if (!el) return;
  var ahora = new Date();
  var h = String(ahora.getHours()).padStart(2, '0');
  var m = String(ahora.getMinutes()).padStart(2, '0');
  el.textContent = 'Última revisión: ' + h + ':' + m;
}

function _iniciarPollingTablaVacia() {
  if (_pollingTablaVacia) return;
  _mostrarBannerPolling(true);
  _actualizarHoraPolling();
  _pollingTablaVacia = setInterval(function() {
    if (estadoGlobalAsesor !== 'ACTIVO') return;
    if (datosGlobales && datosGlobales.length > 0) {
      _detenerPollingTablaVacia();
      return;
    }
    if (_pollingEnCurso) return;
    _pollingEnCurso = true;
    _actualizarHoraPolling();
    var fnName = window.__IS_UNIFIED_VIEW__ ? 'autoAsignarDesdeEquipo' : 'autoAsignarAlEntrar';
    google.script.run
      .withSuccessHandler(function(res) {
        _pollingEnCurso = false;
        _actualizarHoraPolling();
        if (res && res.success && res.nueva) {
          var msgEl = document.getElementById('pollingMensaje');
          if (msgEl) msgEl.textContent = '¡Caso encontrado! Cargando solicitud...';
          Swal.fire({ icon: 'success', title: '¡Nuevo caso asignado!', text: res.message || 'Cargando solicitud...', toast: true, position: 'top-end', showConfirmButton: false, timer: 6000, timerProgressBar: true });
          yaSeIntentoAsignar = false;
          setTimeout(function() { cargarDatos(); }, 2000);
        }
      })
      .withFailureHandler(function() {
        _pollingEnCurso = false;
        _actualizarHoraPolling();
      })
      [fnName]();
  }, _POLLING_INTERVALO_MS);
}

function _detenerPollingTablaVacia() {
  if (_pollingTablaVacia) { clearInterval(_pollingTablaVacia); _pollingTablaVacia = null; }
  _pollingEnCurso = false;
  _mostrarBannerPolling(false);
}

function _asegurarPollingActivo() {
  if (estadoGlobalAsesor === 'ACTIVO' && (!datosGlobales || datosGlobales.length === 0) && !_pollingTablaVacia) {
    _iniciarPollingTablaVacia();
  }
}

function _programarAutoInactivo() {
  if (_timerFinTurno) { clearTimeout(_timerFinTurno); _timerFinTurno = null; }
  google.script.run
    .withSuccessHandler(function(info) {
      var badge = document.getElementById('turnoInfoBadge');
      var txt = document.getElementById('turnoFinText');
      if (!info || !info.tieneTurno) {
        if (badge) badge.style.display = 'none';
        return;
      }

      if (info.fueraTurno) {
        _forzarInactivoPorFueraDeTurno(info);
        return;
      }

      if (badge && txt) {
        txt.textContent = (info.nombreTurno ? info.nombreTurno + ' — ' : '') + 'Hasta ' + info.horaFinStr;
        badge.style.display = 'block';
      }
      var msRestantes = info.minutosRestantes * 60 * 1000;
      if (msRestantes <= 0) {
        _forzarInactivoPorTurno(info);
        return;
      }
      _timerFinTurno = setTimeout(function() {
        _forzarInactivoPorTurno(info);
      }, msRestantes);
    })
    .obtenerInfoTurnoActual();
}

function _forzarInactivoPorFueraDeTurno(info) {
  if (estadoGlobalAsesor === 'INACTIVO') return;
  cambiarMiEstado('INACTIVO');
  var mensaje = '';
  if (info.razon === 'NO_APLICA_HOY') {
    mensaje = 'Tu turno <b>' + (info.nombreTurno || '') + '</b> no aplica hoy.<br>Tu estado se cambió a <b>INACTIVO</b> automáticamente.';
  } else {
    mensaje = 'Tu turno <b>' + (info.nombreTurno || '') + '</b> inicia a las <b>' + info.horaIniStr + '</b>.<br>Tu estado se cambió a <b>INACTIVO</b> hasta que comience tu turno.';
  }
  Swal.fire({
    icon: 'info',
    title: 'Fuera de turno',
    html: mensaje,
    confirmButtonColor: '#253150',
    confirmButtonText: 'Entendido'
  });
}

function _forzarInactivoPorTurno(info) {
  if (estadoGlobalAsesor === 'INACTIVO') return;
  cambiarMiEstado('INACTIVO');
  Swal.fire({
    icon: 'info',
    title: 'Turno finalizado',
    html: 'Tu turno <b>' + (info.nombreTurno || '') + '</b> terminó a las <b>' + info.horaFinStr + '</b>.<br>Tu estado se cambió a <b>INACTIVO</b> automáticamente.',
    confirmButtonColor: '#253150',
    confirmButtonText: 'Entendido'
  });
}

function _quitarFilaTabla(solicitudId) {
  if (!$.fn.DataTable.isDataTable('#miTabla')) return;
  var sid = String(solicitudId);
  $('#miTabla').DataTable()
    .rows(function(i, d) { return String(d[0]) === sid || String(d[6]) === sid; })
    .remove().draw(false);
}

function _miniLoader(on) {
  const btn = document.getElementById('btnRefrescar');
  if (!btn) return;
  if (on) btn.classList.add('btn-refresh-spinning');
  else btn.classList.remove('btn-refresh-spinning');
}

$(document).ready(function () {

  // Mostrar saludo en el loader
  google.script.run.withSuccessHandler(function(email) {
    if (email) {
      var prefijo = email.split('@')[0];
      var nombre = prefijo.split('.').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
      var hora = new Date().getHours();
      var saludo = hora < 12 ? 'Buenos días' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
      var el = document.getElementById('loader-nombre-usuario');
      if (el) { el.textContent = saludo + ', ' + nombre; el.style.opacity = '1'; }
    }
  }).getEmailUsuario();

  sincronizarEstadoInicial(true);
  verificarYAplicarPermisoVigente();
  _programarAutoInactivo();

  $('#btnGuardarCambios')
    .off('click')
    .on('click', manejarGuardarCambios);

  $('#d_estado_q')
    .on('change', actualizarCamposGestion);

  // Vista Unificada: campos condicionales del modal digital (prefijo dig_)
  $('#dig_estado_q').on('change', function() {
    var estado = ($(this).val() || '').toUpperCase();
    var contAplaz = $('#dig_contenedor_aplazamiento');
    var contNeg = $('#dig_contenedor_negacion');
    contAplaz.addClass('d-none');
    contNeg.addClass('d-none');
    if (estado.indexOf('APLAZ') !== -1) {
      contAplaz.removeClass('d-none').hide().fadeIn(200);
      if (tipoSolicitudActual === 'induccion' && typeof MotivoPicker !== 'undefined') {
        try { MotivoPicker.setValue('dig_motivo_aplazamiento', 'Pendiente resultado lote'); } catch(e) {}
      }
    }
    else if (estado.indexOf('NEGAD') !== -1) { contNeg.removeClass('d-none').hide().fadeIn(200); }
    _validarFormDig();
  });

  // P2: Estado button group click (event delegation — works for all 3 modals)
  $(document).on('click', '.estado-btn', function() {
    var group = this.closest('.estado-btn-group');
    if (!group) return;
    var value = this.getAttribute('data-value');
    group.querySelectorAll('.estado-btn').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    var sel = group.nextElementSibling;
    if (sel && sel.tagName === 'SELECT') {
      sel.value = value;
      $(sel).trigger('change');
    }
  });

  // P6: Real-time validation hooks
  $('#dig_biometria').on('change', _validarFormDig);
  $('#dig_fecha_radicacion_sai').on('input', _validarFormDig);
  $('#dig_motivo_aplazamiento, #dig_motivo_negacion').on('change', _validarFormDig);
  $('#bio_resLlamada, #bio_resFinal').on('change', _validarFormBio);
  $('#bio_motivoAplazamiento').on('change', _validarFormBio);
  $('#rst_estado_q').on('change', _validarFormRst);
  $('#rst_poliza').on('input', _validarFormRst);
  $('#rst_motivo_aplazamiento, #rst_motivo_negacion').on('change', _validarFormRst);

  // Limpiar modo re-gestión si el analista cierra el modal sin guardar
  document.getElementById('modalDigital').addEventListener('hidden.bs.modal', function() {
    window._modoRegestion = null;
  });
  document.getElementById('modalReestudio').addEventListener('hidden.bs.modal', function() {
    window._modoRegestion = null;
  });

});
function actualizarCamposGestion() {

  const estado = ($('#d_estado_q').val() || '').toUpperCase();

  const contAplaz = $('#contenedor_aplazamiento');
  const contNeg = $('#contenedor_negacion');

  const selectAplaz = $('#d_motivo_aplazamiento');
  const selectNeg = $('#d_motivo_negacion');

  contAplaz.addClass('d-none');
  contNeg.addClass('d-none');

  selectAplaz.prop('required', false);
  selectNeg.prop('required', false);

  if (estado.includes('APLAZ')) {

    contAplaz
      .removeClass('d-none')
      .hide()
      .fadeIn(200);

    selectAplaz.prop('required', true);
    selectNeg.val('');
    if (typeof MotivoPicker !== 'undefined') MotivoPicker.reset('d_motivo_negacion');
  }

  else if (
    estado.includes('NEGAD') ||
    estado.includes('RECHAZ')
  ) {

    contNeg
      .removeClass('d-none')
      .hide()
      .fadeIn(200);

    selectNeg.prop('required', true);

    selectAplaz.val('');
    if (typeof MotivoPicker !== 'undefined') MotivoPicker.reset('d_motivo_aplazamiento');
  }

  else {

    selectAplaz.val('');
    selectNeg.val('');
    if (typeof MotivoPicker !== 'undefined') {
      MotivoPicker.reset('d_motivo_aplazamiento');
      MotivoPicker.reset('d_motivo_negacion');
    }
  }
}

/**
 * Ajusta los campos del formulario de gestión según el tipo de solicitud.
 * Para inducciones: oculta biometría, limita estado final a APLAZADO y motivo a "Pendiente resultado lote".
 */
function ajustarCamposPorTipoSolicitud() {
  const contBiometria = $('#contenedor_biometria');
  const selectEstado = $('#d_estado_q');
  const selectAplaz = $('#d_motivo_aplazamiento');

  var contFechaRad = $('#d_fecha_radicacion_sai').closest('.gestion-group, .col-md-6, .col-md-4');

  if (tipoSolicitudActual === 'induccion') {
    // Ocultar biometría y fecha radicación SAI
    contBiometria.addClass('d-none');
    contFechaRad.addClass('d-none');
    $('#d_biometria').val('No');
    $('#d_fecha_radicacion_sai').val('');

    // Estado Final: solo APLAZADO
    selectEstado.html(`
      <option value="" selected disabled>Seleccione una opción</option>
      <option value="APLAZADO">APLAZADO</option>
    `);

    // Motivo Aplazamiento: solo "Pendiente resultado lote"
    selectAplaz.html(`
      <option value="" selected>Sin aplazamiento</option>
      <option value="Pendiente resultado lote">Pendiente resultado lote</option>
    `);

    // Expandir el Estado Final para ocupar el ancho completo
    selectEstado.closest('.gestion-group').removeClass('col-md-8').addClass('col-md-12');

  } else {
    // Restaurar biometría y fecha radicación SAI
    contBiometria.removeClass('d-none');
    contFechaRad.removeClass('d-none');

    // Restaurar Estado Final completo
    selectEstado.html(`
      <option value="" selected disabled>Seleccione una opción</option>
      <option value="APROBADO">APROBADO</option>
      <option value="APLAZADO">APLAZADO</option>
      <option value="RECHAZADO">RECHAZADO</option>
      <option value="PENDIENTE VALIDACIÓN">PENDIENTE VALIDACIÓN</option>
      <option value="PENDIENTE EVIDENTE">PENDIENTE EVIDENTE</option>
    `);

    // Restaurar Motivo Aplazamiento completo
    selectAplaz.html(`
      <option value="" selected>Sin aplazamiento</option>
      <option value="Un deudor solidario">Un deudor solidario</option>
      <option value="Dos deudores solidarios">Dos deudores solidarios</option>
      <option value="Extractos bancarios">Extractos bancarios</option>
      <option value="Estados financieros">Estados financieros</option>
      <option value="Cámara de comercio">Cámara de comercio</option>
      <option value="Acta de junta de socios">Acta de junta de socios</option>
      <option value="Acta de constitución consorcio">Acta de constitución consorcio</option>
      <option value="Presentar constituyentes del consorcio">Presentar constituyentes del consorcio</option>
      <option value="Pendiente entrevista telefónica">Pendiente entrevista telefónica</option>
      <option value="Pendiente validación de datos">Pendiente validación de datos</option>
      <option value="Pendiente aceptación LMI">Pendiente aceptación LMI</option>
      <option value="Pendiente constitución CDT">Pendiente constitución CDT</option>
      <option value="Pendiente biometria">Pendiente biometría</option>
      <option value="Pendiente confirmar destino">Pendiente confirmar destino</option>
      <option value="Certificado laboral">Certificado laboral</option>
      <option value="Partida presupuestal">Partida presupuestal</option>
      <option value="Confirmar solicitud simultánea">Confirmar solicitud simultánea</option>
      <option value="Documento de identidad legible">Documento de identidad legible</option>
      <option value="Formulario con firma y huella legible">Formulario con firma y huella legible</option>
      <option value="Cerrada por intentos fallidos">Cerrada por intentos fallidos</option>
      <option value="Pendiente deudor y documentos">Pendiente deudor y documentos</option>
      <option value="Pendiente resultado lote">Pendiente resultado lote</option>
      <option value="Error de terceros">Error de terceros</option>
      <option value="Pendiente recaudo">Pendiente recaudo</option>
      <option value="Pendiente simasol">Pendiente simasol</option>
      <option value="Pendiente respuesta eli">Pendiente respuesta ELI</option>
    `);

    // Restaurar ancho del Estado Final
    selectEstado.closest('.gestion-group').removeClass('col-md-12').addClass('col-md-8');
  }
}

function sincronizarEstadoInicial(debeCargarTabla = false) {
  google.script.run
    .withSuccessHandler(function(estadoReal) {
      if (estadoReal && estadoReal !== "ERROR") {
        estadoGlobalAsesor = estadoReal.toUpperCase();
        
        const statusText = $('#currentStatusText');
        const statusDot = $('#statusDot');
        const card = $('#statusIndicatorCard');

        if (statusText.length) statusText.text(estadoGlobalAsesor);
        
        if (estadoGlobalAsesor === 'ACTIVO') {
          statusDot.css('background-color', '#22c55e').addClass('animate-pulse');
          card.css('border-color', '#22c55e');
        } else {
          statusDot.css('background-color', '#f59e0b').removeClass('animate-pulse');
          card.css('border-color', '#e2e8f0');
        }
        console.log("Sincronizado con DB: " + estadoGlobalAsesor);
      }
      
      if (debeCargarTabla) {
        cargarDatos();
      }
    })
    .obtenerMiEstadoActual(); 
}

function cargarDatos() {
  const loader = document.getElementById('loader-container');
  if (!cargaInicialHecha) {
    if (loader) { loader.classList.remove('loader-hidden'); loader.style.display = 'flex'; }
  } else {
    _miniLoader(true);
  }

  // Cargar conteo cruzado de gestiones del día (todas las vistas)
  google.script.run
    .withSuccessHandler(function(cruzado) {
      if (cruzado && typeof cruzado.hoyTotal === 'number') {
        if (typeof animarNumero === "function") {
          animarNumero("countHoy", cruzado.hoyTotal);
        }
      }
    })
    .obtenerGestionesHoyCruzadas();

  var _dataFetchFn = (window.__IS_UNIFIED_VIEW__) ? 'getUnifiedTableData' : 'getTableData';
  google.script.run
    .withSuccessHandler(function (response) {

      if (response.error) {
        console.error("getUnifiedTableData error:", response.error);
        Swal.fire({ icon: "warning", title: "Error al cargar datos", text: response.error, confirmButtonColor: "#253150" });
      }

      var tipoVista = response.tipoVista || 'DIGITAL';
      if (tipoVista === 'REESTUDIOS') {
        renderizarTabla(_normalizarFilasReestudios(response.tabla));
      } else {
        renderizarTabla(response.tabla);
      }

      // Notificar reasignaciones recientes por admin (solo una vez por solicitud)
      if (response.reasignaciones && response.reasignaciones.length > 0) {
        if (!window._reasignacionesMostradas) window._reasignacionesMostradas = {};
        var nuevas = response.reasignaciones.filter(function(r) {
          return !window._reasignacionesMostradas[r.solicitud];
        });
        if (nuevas.length > 0) {
          nuevas.forEach(function(r) { window._reasignacionesMostradas[r.solicitud] = true; });
          var msgs = nuevas.map(function(r) {
            return '<b>' + r.solicitud + '</b> (por ' + r.admin.split('@')[0] + ')';
          }).join('<br>');
          Swal.fire({
            icon: 'info',
            title: 'Caso reasignado por Admin',
            html: 'Se te asignó manualmente:<br>' + msgs,
            confirmButtonColor: '#253150',
            confirmButtonText: 'Entendido',
            timer: 8000,
            timerProgressBar: true
          });
        }
      }

      // UX: Update sync time
      if (typeof UX !== 'undefined') UX.updateSyncTime();

      // Digital: getTableData incluye header row → length - 1
      // Reestudios: getReestudiosData devuelve solo datos → length directo
      var registrosPendientes = 0;
      if (tipoVista === 'REESTUDIOS') {
        registrosPendientes = response.tabla ? response.tabla.length : 0;
      } else {
        registrosPendientes = response.tabla ? Math.max(response.tabla.length - 1, 0) : 0;
      }
      
      if (typeof animarNumero === "function") {
        animarNumero("countTotal", registrosPendientes > 0 ? registrosPendientes : 0);
      }

      // Cupos restantes (solo vista unificada)
      if (window.__IS_UNIFIED_VIEW__ && document.getElementById('countCupos')) {
        google.script.run.withSuccessHandler(function(cuposInfo) {
          if (cuposInfo && typeof cuposInfo.totalLimite === 'number') {
            var restantes = cuposInfo.totalLimite - cuposInfo.totalUsado;
            if (typeof animarNumero === "function") animarNumero("countCupos", restantes > 0 ? restantes : 0);
            var det = document.getElementById('cuposDetalle');
            if (det) det.textContent = cuposInfo.totalUsado + ' / ' + cuposInfo.totalLimite + ' usados';
            if (cuposInfo.cumplido && typeof UX !== 'undefined') {
              UX.showToast('Has cumplido todos tus cupos del día (' + cuposInfo.totalUsado + '/' + cuposInfo.totalLimite + ')', 'success');
            }
          }
        }).verificarMisCupos();
      }

      // Cargar pendientes de validación/evidente
      if (window.__IS_UNIFIED_VIEW__) {
        google.script.run
          .withSuccessHandler(function(pendientes) { actualizarBannerPendientes(pendientes || []); })
          .withFailureHandler(function(e) { console.warn('obtenerCasosPendientesAnalista:', e); })
          .obtenerCasosPendientesAnalista();
      }

      const tablaRealmenteVacia = registrosPendientes <= 0;
      const estadoParaValidar = (typeof estadoGlobalAsesor !== 'undefined' ? estadoGlobalAsesor : ($('#selectEstadoAsesor').val() || "INACTIVO")).toUpperCase();

      if (!tablaRealmenteVacia) _detenerPollingTablaVacia();

      if (tablaRealmenteVacia && !yaSeIntentoAsignar && estadoParaValidar === "ACTIVO") {
        yaSeIntentoAsignar = true; 
        console.log("Detectado: Tabla vacía y asesor ACTIVO. Solicitando asignación...");

        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success && res.nueva) {
              Swal.fire({
                icon: 'info',
                title: 'Nueva Solicitud',
                text: res.message || 'Se te ha asignado un nuevo registro.',
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 5000,
                timerProgressBar: true
              });
              setTimeout(() => {
                yaSeIntentoAsignar = false;
                cargarDatos();
              }, 3000);
            } else {
              yaSeIntentoAsignar = false;
              _iniciarPollingTablaVacia();
              console.warn("Asignación omitida: " + res.message);
              if (res.message && res.message.trim() !== '') {
                Swal.fire({
                  icon: 'warning',
                  title: 'Sin nuevos casos',
                  text: res.message,
                  toast: true,
                  position: 'top-end',
                  showConfirmButton: false,
                  timer: 7000,
                  timerProgressBar: true
                });
              }
            }
          })
          .withFailureHandler(function(err) {
            console.error("Error en autoAsignarAlEntrar:", err);
            yaSeIntentoAsignar = false;
            _iniciarPollingTablaVacia();
          })
          [window.__IS_UNIFIED_VIEW__ ? 'autoAsignarDesdeEquipo' : 'autoAsignarAlEntrar']();

      } else {
        if (!tablaRealmenteVacia) console.log("Asignación omitida: La tabla ya tiene datos.");
        if (estadoParaValidar !== "ACTIVO") console.log("Asignación omitida: El asesor está en estado " + estadoParaValidar);
        if (tablaRealmenteVacia && estadoParaValidar === "ACTIVO") _asegurarPollingActivo();
      }
    })
    .withFailureHandler(function (e) {
      if (loader) { loader.classList.add('loader-hidden'); setTimeout(() => loader.style.display = 'none', 800); }
      _miniLoader(false);
      console.error("Error crítico en getTableData:", e);
      Swal.fire({
        icon: 'error',
        title: 'Error de Conexión',
        text: 'No se pudieron cargar los datos de la tabla.',
        confirmButtonColor: '#253150'
      });
      _asegurarPollingActivo();
    })
    [_dataFetchFn]();
}

// Convierte las filas-objeto de getReestudiosData() a la estructura posicional
// "__REESTUDIO__" que entienden renderizarTabla() y poblarModalRst().
function _normalizarFilasReestudios(filas) {
  if (!Array.isArray(filas)) return [['_header_rst']];
  var out = filas.map(function(o) {
    if (Array.isArray(o)) return o;

    if (o.fuente === 'DIGITAL') {
      var fila = new Array(38).fill('');
      fila[0]  = o.solicitud || '';
      fila[1]  = o.poliza || '';
      fila[2]  = o.identificacion || '';
      fila[3]  = o.tipoIdentificacion || '';
      fila[4]  = o.nombreInquilino || '';
      fila[5]  = o.correoInquilino || '';
      fila[6]  = o.telefonoInquilino || '';
      fila[7]  = o.ingresos || '';
      fila[8]  = o.fechaExpedicion || '';
      fila[9]  = o.canon || '';
      fila[10] = o.cuota || '';
      fila[11] = o.direccionInmueble || '';
      fila[12] = o.destinoInmueble || '';
      fila[13] = o.ciudadInmueble || '';
      fila[14] = o.nombreAsesor || '';
      fila[15] = o.correoAsesor || '';
      fila[16] = o.estadoGeneral || '';
      fila[17] = o.fechaRadicacion || '';
      fila[18] = o.fechaResultado || '';
      fila[20] = o.clase || o.tipoProceso || '';
      fila[23] = o.biometriaActual || '';
      fila[26] = o.fechaAsignacion || '';
      fila.push(o.categoriaScore || '');
      fila.push(o.inmobiliaria || '');
      return fila;
    }

    var fila = new Array(38).fill('');
    fila[0]  = o.solicitud || '';
    fila[1]  = o.poliza || o.origen || '';
    fila[2]  = o.linkDrive || '';
    fila[3]  = o.origen || '';
    fila[4]  = o.tipoProceso || '';
    fila[5]  = o.claseSolicitud || o.clase || '';
    fila[8]  = o.fechaAsignacion || '';
    fila[9]  = o.canon || '';
    fila[16] = '__REESTUDIO__';
    fila[17] = o.fechaRadicacion || '';
    fila[20] = o.tipoProceso || o.claseSolicitud || o.clase || '';
    fila[26] = o.fechaAsignacion || '';
    fila.push('');
    return fila;
  });
  return [['_header_rst']].concat(out);
}

function renderResultadosPorTipo(resultados) {
  const container = document.getElementById("accordionResultados");
  if (!container || !resultados) return;
  container.innerHTML = ""; 

  let idx = 0;
  Object.entries(resultados).forEach(([tipo, items]) => {
    if (!Array.isArray(items) || items.length === 0) return;
    idx++;
    const collapseId = `collapse-${idx}`;
    const registrosUnicos = [];
    const llavesVistas = new Set();

    items.forEach(item => {

      const llave = `${item.nombre}-${item.descripcionResultado}-${item.estadoEstudio}`.toLowerCase().trim();
      if (!llavesVistas.has(llave)) {
        llavesVistas.add(llave);
        registrosUnicos.push(item);
      }
    });

    let contenido = registrosUnicos.map(item => `
        <div class="mb-3 border-bottom pb-2">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <div class="fw-bold text-dark me-2">
              ${item.nombre || "N/A"} ${item.identificacion ? `(${item.identificacion})` : ""}
            </div>
            <span class="badge shadow-sm text-nowrap" style="background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; font-size: 0.75rem;">
              ${item.estadoEstudio || "Sin estado"}
            </span>
          </div>
          <div class="small text-muted">
            <i class="bi bi-info-circle me-1"></i>${item.descripcionResultado || "Sin descripción"}
          </div>
        </div>`).join("");

    container.innerHTML += `
      <div class="accordion-item mb-2 border rounded-3 overflow-hidden">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" style="background-color: #f8fafc; color: #253150;">
            ${tipo} (${registrosUnicos.length})
          </button>
        </h2>
        <div id="${collapseId}" class="accordion-collapse collapse">
          <div class="accordion-body bg-white">${contenido}</div>
        </div>
      </div>`;
  });
}

function manejarGuardarCambios() {
  const btn = $('#btnGuardarCambios');
  const solId = btn.attr('data-solicitud-id'); 
  if (!solId) {
    Swal.fire({
      title: 'Error', 
      text: 'ID de solicitud no detectado.', 
      icon: 'error',
      confirmButtonColor: '#253150'
    });
    return;
  }

  const datos = {
    solicitudId: solId,
    biometria: $('#d_biometria').val(),
    comentarios_gestion: $('#d_comentarios_gestion').val(),
    estado_q: $('#d_estado_q').val(),
    motivo_aplazamiento: ($('#d_motivo_aplazamiento').val() || '').trim(),
    motivo_negacion: ($('#d_motivo_negacion').val() || '').trim(),
    tipoSolicitudActual: tipoSolicitudActual,
    fecha_radicacion_sai: tipoSolicitudActual === 'induccion' ? '' : ($('#d_fecha_radicacion_sai').val() || '').trim()
  };

  if (!datos.estado_q || (!datos.biometria && tipoSolicitudActual !== 'induccion')) {
    Swal.fire({
      title: 'Atención', 
      text: tipoSolicitudActual === 'induccion' 
        ? 'Por favor completa el campo obligatorio (Estado Final).' 
        : 'Por favor completa todos los campos obligatorios (Estado Final y Biometría).', 
      icon: 'warning',
      confirmButtonColor: '#253150'
    });
    return;
  }

  const estadoUpper = datos.estado_q.toUpperCase();
  if (estadoUpper.includes('APLAZ') && !datos.motivo_aplazamiento) {
    Swal.fire({
      title: 'Atención', 
      text: 'El motivo de aplazamiento es obligatorio.', 
      icon: 'warning',
      confirmButtonColor: '#253150'
    });
    return;
  } 
  if ((estadoUpper.includes('NEGAD') || estadoUpper.includes('RECHAZ')) && !datos.motivo_negacion) {
    Swal.fire({
      title: 'Atención',
      text: 'El motivo de negación es obligatorio.',
      icon: 'warning',
      confirmButtonColor: '#253150'
    });
    return;
  }

  if (datos.fecha_radicacion_sai) {
    const ahoraLocal = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    if (datos.fecha_radicacion_sai > ahoraLocal) {
      Swal.fire({ title: 'Fecha inválida', text: 'La Fecha y Hora de Radicación SAI no puede ser futura.', icon: 'warning', confirmButtonColor: '#253150' });
      return;
    }
  }

  // UX: loading state on button
  const btnGuardar = document.getElementById('btnGuardarCambios');
  if (typeof UX !== 'undefined') UX.setBtnLoading(btnGuardar, true);

  Swal.fire({ 
    title: 'Procesando...', 
    html: 'Guardando gestión y buscando nueva asignación...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading() 
  });

  google.script.run
    .withSuccessHandler(r => {
      if (typeof UX !== 'undefined') UX.setBtnLoading(btnGuardar, false);
      
      if (r.success) {
        // UX: Log activity
        if (typeof UX !== 'undefined') {
          UX.logActivity(datos.solicitudId, datos.estado_q, datos.motivo_aplazamiento || datos.motivo_negacion || '');
          UX.updateSyncTime();
        }

        _quitarFilaTabla(datos.solicitudId);

        if (r.disparaAsignacion) {
          _dispararAutoAsignacion();
        }

        Swal.fire({
          icon: 'success',
          title: '¡Operación Exitosa!',
          html: r.message ? r.message.replace(/\n/g, '<br>') : 'Gestión guardada correctamente.',
          confirmButtonColor: '#253150',
          timer: 2500,
          timerProgressBar: true
        }).then(() => {
          if (typeof UX !== 'undefined') UX.showToast('Sol. ' + datos.solicitudId + ' → ' + datos.estado_q, 'success');
          const modalElement = document.getElementById('modalDetalles');
          const modalInstance = bootstrap.Modal.getInstance(modalElement);
          if (modalInstance) modalInstance.hide();
          cargarDatos();
        });
      } else {
        Swal.fire({
          title: 'Atención', 
          text: r.message, 
          icon: 'warning',
          confirmButtonColor: '#253150'
        });
      }
    })
    .withFailureHandler(e => {
      if (typeof UX !== 'undefined') UX.setBtnLoading(btnGuardar, false);
      Swal.fire({
        title: 'Error Crítico', 
        text: 'Fallo de conexión: ' + e.message, 
        icon: 'error',
        confirmButtonColor: '#BD0F14'
      });
    })
    .guardarCambiosInternos(datos);
}

function renderEstadoBadge(d) {
  const s = String(d || '').toUpperCase();
  if (s.includes('APLAZ')) return `<span class="badge" style="background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; padding:6px 12px; border-radius:8px;">${d}</span>`;
  if (s.includes('APROB')) return `<span class="badge" style="background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; padding:6px 12px; border-radius:8px;">${d}</span>`;
  return `<span class="badge" style="background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; padding:6px 12px; border-radius:8px;">${d || 'Sin estado'}</span>`;
}

function formatearMiles(valor) {
  if (valor === undefined || valor === null || valor === '') return '$ 0';
  const n = parseInt(valor.toString().replace(/\D/g, ''), 10);
  return isNaN(n) ? valor : '$ ' + n.toLocaleString('es-CO');
}

function animarNumero(id, valorFinal) {
  const elemento = $(`#${id}`);
  const valorActual = parseInt(elemento.text()) || 0;
  $({ countNum: valorActual }).animate({ countNum: valorFinal }, {
    duration: 1000,
    easing: 'swing',
    step: function() { elemento.text(Math.ceil(this.countNum)); },
    complete: function() { elemento.text(this.countNum); }
  });
}

function cambiarMiEstado(nuevoEstado) {
  var estadoAnterior = estadoGlobalAsesor;
  estadoGlobalAsesor = nuevoEstado.toUpperCase();

  const statusText = $('#currentStatusText');
  const statusDot = $('#statusDot');
  const card = $('#statusIndicatorCard');

  if (statusText.length) statusText.text(estadoGlobalAsesor);

  if (estadoGlobalAsesor === 'ACTIVO') {
    statusDot.css('background-color', '#22c55e').addClass('animate-pulse');
    card.css('border-color', '#22c55e');
    yaSeIntentoAsignar = false;
  } else {
    statusDot.css('background-color', '#f59e0b').removeClass('animate-pulse');
    card.css('border-color', '#e2e8f0');
    _detenerPollingTablaVacia();
  }

    .withSuccessHandler(function(response) {

var _tipoPermisoSeleccionado = '';
// Tipos que requieren hora (permisos parciales del día)
var _TIPOS_CON_HORA = ['CITA MEDICA', 'PERMISO PERSONAL', 'EXAMEN OCUPACIONAL'];

function iniciarSolicitudPermiso(tipo) {
    _tipoPermisoSeleccionado = tipo;
    var hoy = new Date();
    var hoyStr = hoy.getFullYear() + '-' + String(hoy.getMonth()+1).padStart(2,'0') + '-' + String(hoy.getDate()).padStart(2,'0');
    document.getElementById('ausencia-fecha-inicio').value = hoyStr;
    document.getElementById('ausencia-fecha-fin').value = hoyStr;
    document.getElementById('ausencia-observacion').value = '';
    document.getElementById('ausencias-tipo-badge').textContent = tipo;

    var esParcial = _TIPOS_CON_HORA.indexOf(tipo) !== -1;
    var colHoraI = document.getElementById('col-ausencia-hora-inicio');
    var colHoraF = document.getElementById('col-ausencia-hora-fin');
    if (colHoraI) colHoraI.style.display = esParcial ? '' : 'none';
    if (colHoraF) colHoraF.style.display = esParcial ? '' : 'none';
    if (esParcial) {
        document.getElementById('ausencia-hora-inicio').value = '08:00';
        document.getElementById('ausencia-hora-fin').value = '09:00';
    } else {
        var hi = document.getElementById('ausencia-hora-inicio');
        var hf = document.getElementById('ausencia-hora-fin');
        if (hi) hi.value = '';
        if (hf) hf.value = '';
    }

    document.getElementById('ausencias-paso1').style.display = 'none';
    document.getElementById('ausencias-paso2').style.display = 'block';
}

function volverAusenciasPaso1() {
    document.getElementById('ausencias-paso1').style.display = 'block';
    document.getElementById('ausencias-paso2').style.display = 'none';
    _tipoPermisoSeleccionado = '';
}

function enviarSolicitudPermiso() {
    var fi = document.getElementById('ausencia-fecha-inicio').value;
    var ff = document.getElementById('ausencia-fecha-fin').value;
    if (!fi || !ff) {
        Swal.fire({ icon: 'warning', title: 'Fechas requeridas', text: 'Por favor selecciona las fechas de inicio y fin.', confirmButtonColor: '#3b82f6' });
        return;
    }
    if (ff < fi) {
        Swal.fire({ icon: 'warning', title: 'Fechas inválidas', text: 'La fecha de fin no puede ser anterior a la de inicio.', confirmButtonColor: '#3b82f6' });
        return;
    }

    var esParcial = _TIPOS_CON_HORA.indexOf(_tipoPermisoSeleccionado) !== -1;
    var fechaInicioFinal = fi;
    var fechaFinFinal = ff;

    if (esParcial) {
        var hi = document.getElementById('ausencia-hora-inicio').value;
        var hf = document.getElementById('ausencia-hora-fin').value;
        if (!hi || !hf) {
            Swal.fire({ icon: 'warning', title: 'Horas requeridas', text: 'Por favor selecciona la hora de inicio y fin.', confirmButtonColor: '#3b82f6' });
            return;
        }
        if (fi === ff && hf <= hi) {
            Swal.fire({ icon: 'warning', title: 'Horas inválidas', text: 'La hora de fin debe ser posterior a la de inicio.', confirmButtonColor: '#3b82f6' });
            return;
        }
        fechaInicioFinal = fi + ' ' + hi;
        fechaFinFinal = ff + ' ' + hf;
    }

    var obs = document.getElementById('ausencia-observacion').value.trim();
    var btn = document.getElementById('btn-enviar-permiso');
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Enviando...';

    google.script.run
        .withSuccessHandler(function(res) {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send-fill me-2"></i>Enviar Solicitud';
            bootstrap.Modal.getInstance(document.getElementById('modalNovedades')).hide();
            volverAusenciasPaso1();
            Swal.fire({
                icon: res.success ? 'success' : 'error',
                title: res.success ? 'Solicitud enviada' : 'Error',
                text: res.message,
                confirmButtonColor: '#3b82f6',
                timer: res.success ? 4000 : undefined,
                timerProgressBar: res.success
            });
        })
        .withFailureHandler(function(err) {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-send-fill me-2"></i>Enviar Solicitud';
            Swal.fire({ icon: 'error', title: 'Error', text: err.message, confirmButtonColor: '#3b82f6' });
        })
        .solicitarPermiso(_tipoPermisoSeleccionado, fechaInicioFinal, fechaFinFinal, obs);
}

}

function guardarGestionReestudioDesdeDigital() {
  var solicitudId = document.getElementById('rmd_solicitudId').value;
  var estado = document.getElementById('rmd_estado_q').value;
  var poliza  = (document.getElementById('rmd_poliza').value || '').trim();

  if (!estado) { Swal.fire({ title: 'Atención', text: 'Selecciona un estado de gestión.', icon: 'warning', confirmButtonColor: '#253150' }); return; }
  if (!poliza)  { Swal.fire({ title: 'Atención', text: 'El campo Póliza es obligatorio.', icon: 'warning', confirmButtonColor: '#253150' }); return; }
  if (estado === 'APLAZADA' && !document.getElementById('rmd_motivo_aplazamiento').value) {
    Swal.fire({ title: 'Atención', text: 'El motivo de aplazamiento es obligatorio.', icon: 'warning', confirmButtonColor: '#253150' }); return;
  }
  if (estado === 'NEGADA' && !document.getElementById('rmd_motivo_negacion').value) {
    Swal.fire({ title: 'Atención', text: 'El motivo de negación es obligatorio.', icon: 'warning', confirmButtonColor: '#253150' }); return;
  }

  var datos = {
    solicitudId: solicitudId,
    estado_q: estado,
    poliza: poliza,
    motivo_aplazamiento: estado === 'APLAZADA' ? document.getElementById('rmd_motivo_aplazamiento').value : '',
    motivo_negacion:     estado === 'NEGADA'   ? document.getElementById('rmd_motivo_negacion').value    : '',
    comentarios_gestion: document.getElementById('rmd_observaciones').value || '',
    biometria: '',
    tipoSolicitudActual: 'reestudio'
  };

  var modalInstance = bootstrap.Modal.getInstance(document.getElementById('modalReestudioDigital'));
  if (modalInstance) modalInstance.hide();

  Swal.fire({ title: 'Guardando...', allowOutsideClick: false, didOpen: function() { Swal.showLoading(); } });

  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) {
        _quitarFilaTabla(datos.solicitudId);
        if (r.disparaAsignacion) _dispararAutoAsignacion();

        if (typeof UX !== 'undefined') {
          Swal.close();
          UX.showSuccessCheck(function() {
            UX.showToast('Gestión guardada: ' + datos.estado_q, 'success');
            yaSeIntentoAsignar = false;
            cargarDatos();
          });
        } else {
          Swal.fire({ icon: 'success', title: 'Guardado', text: r.message, confirmButtonColor: '#253150' }).then(function() {
            yaSeIntentoAsignar = false;
            cargarDatos();
          });
        }
      } else {
        Swal.fire({ icon: 'warning', title: 'Atención', html: r.message ? r.message.replace(/\n/g, '<br>') : 'No se pudo guardar la gestión.', confirmButtonColor: '#253150' });
      }
    })
    .withFailureHandler(function(e) {
      Swal.fire({ title: 'Error', text: e.message, icon: 'error', confirmButtonColor: '#BD0F14' });
    })
    .guardarCambiosInternos(datos);
}

var _filaActualUnificada = null;

function detectarTipoCaso(rowData) {
  if (!rowData) return 'digital';
  var marcador = String(rowData[16] || '').toUpperCase();
  if (marcador === '__REESTUDIO__') return 'reestudio';
  if (marcador === '__DESAPLAZAMIENTO__') return 'desaplazamiento';
  if (rowData.__fuente === 'REESTUDIO') return 'reestudio';
  var marcadorSinGuion = marcador.replace(/_/g, ' ');
  if (marcadorSinGuion === 'APROBADO PENDIENTE BIOMETRIA' || marcador === 'APROBADO_PENDIENTE_BIOMETRIA') return 'desaplazamiento';
  var clase = String(rowData[20] || '').toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
  if (clase === 'INDUCCION') return 'induccion';
  return 'digital';
}

  if (!datosGlobales || !datosGlobales[index]) return;
  var fila = datosGlobales[index];
  _filaActualUnificada = fila;

  }

function renderResultadosUnificados(containerId, resultados) {
  var cont = document.getElementById(containerId);
  if (!cont) return;
  if (!resultados || Object.keys(resultados).length === 0) {
    cont.innerHTML = '<p class="text-muted text-center py-3">Sin resultados de deudores.</p>';
    return;
  }
  var html = '';
  var idx = 0;
  for (var tipo in resultados) {
    var items = resultados[tipo];
    html += '<div class="accordion-item" style="border:none;margin-bottom:8px;">';
    html += '<h2 class="accordion-header"><button class="accordion-button ' + (idx > 0 ? 'collapsed' : '') + '" type="button" data-bs-toggle="collapse" data-bs-target="#unif_acc_' + idx + '" style="font-weight:700;font-size:0.9rem;border-radius:12px;">' + tipo + ' (' + items.length + ')</button></h2>';
    html += '<div id="unif_acc_' + idx + '" class="accordion-collapse collapse ' + (idx === 0 ? 'show' : '') + '">';
    html += '<div class="accordion-body" style="padding:12px;">';
    items.forEach(function(item) {
      var estado = (item.estadoEstudio || '').toUpperCase();
      var badgeClass = 'bg-secondary';
      if (estado.indexOf('APROBADO') !== -1) badgeClass = 'bg-success';
      else if (estado.indexOf('NEGAD') !== -1 || estado.indexOf('RECHAZ') !== -1) badgeClass = 'bg-danger';
      else if (estado.indexOf('ESTUDIO') !== -1 || estado.indexOf('BORRADOR') !== -1) badgeClass = 'bg-warning text-dark';
      else if (estado.indexOf('APLAZ') !== -1 || estado.indexOf('PENDIENTE') !== -1) badgeClass = 'bg-info text-dark';
      html += '<div class="p-3 mb-2 bg-white border rounded-3">';
      html += '<div class="d-flex justify-content-between align-items-center mb-2">';
      html += '<div><strong>' + (item.nombre || 'Sin nombre') + '</strong><br><small class="text-muted"><i class="bi bi-card-heading me-1"></i>' + (item.identificacion || '') + '</small></div>';
      html += '<span class="badge ' + badgeClass + '" style="font-size:0.78rem;">' + (item.estadoEstudio || 'Sin estado') + '</span>';
      html += '</div>';
      if (item.descripcionResultado) {
        html += '<div class="pt-2 border-top" style="font-size:0.82rem;"><i class="bi bi-file-text me-1 text-muted"></i><span class="text-dark">' + item.descripcionResultado + '</span></div>';
      }
      html += '</div>';
    });
    html += '</div></div></div>';
    idx++;
  }
  cont.innerHTML = html;
}

function _getBtnGuardarActivo() {

  if (!modal) return null;

function _validarFechaSaiAnteDeGuardar(inputId) {
  var el = document.getElementById(inputId);
  if (!el) return true;
  var val = el.value.trim();
  if (!val) return true;
  if (typeof _parseFechaSaiInput !== 'function') return true;
  var fecha = _parseFechaSaiInput(val);
  if (!fecha) {
    Swal.fire({ icon: 'warning', title: 'Fecha inválida', text: 'La fecha de radicación SAI no tiene el formato correcto (DD/MM/AAAA HH:MM). Corrígela o usa el botón "Ahora".' });
    el.focus();
    return false;
  }
  if (fecha.getTime() > new Date().getTime()) {
    Swal.fire({ icon: 'warning', title: 'Fecha futura', text: 'La fecha de radicación SAI no puede ser posterior a la hora actual.' });
    el.focus();
    return false;
  }
  return true;
}

function _setHeaderTipo(modalId, tipoClass) {
  var modal = document.getElementById(modalId);
  if (!modal) return;
  var header = modal.querySelector('.modal-header-inner');
  if (!header) return;
  header.classList.remove('tipo-induccion', 'tipo-reestudio-digital', 'tipo-reestudio', 'tipo-biometria');
  if (tipoClass) header.classList.add(tipoClass);
}

function _validarFormDig() {
  var btn = document.getElementById('dig_btnGuardar');
  if (!btn) return;
  var estado = (document.getElementById('dig_estado_q').value || '').toUpperCase();
  if (!estado) { btn.disabled = true; return; }
  var esInd = (tipoSolicitudActual === 'induccion');
  if (!esInd) {
    if (!(document.getElementById('dig_biometria').value || '')) { btn.disabled = true; return; }
    var fechaVal = (document.getElementById('dig_fecha_radicacion_sai').value || '').trim();
    if (!fechaVal) { btn.disabled = true; return; }
    if (typeof _parseFechaSaiInput === 'function') {
      var fechaParsed = _parseFechaSaiInput(fechaVal);
      if (!fechaParsed || fechaParsed.getTime() > Date.now()) { btn.disabled = true; return; }
    }
  }
  if (estado.indexOf('APLAZ') !== -1) {
    if (!(document.getElementById('dig_motivo_aplazamiento').value || '')) { btn.disabled = true; return; }
  }
  if (estado.indexOf('NEGAD') !== -1 || estado.indexOf('RECHAZ') !== -1) {
    if (!(document.getElementById('dig_motivo_negacion').value || '')) { btn.disabled = true; return; }
  }
  btn.disabled = false;
}

  var btn = document.getElementById('bio_btnGuardar');

  if (resFinal.indexOf('APLAZ') !== -1) {

function manejarGuardarDigital() {
  var btn = document.getElementById('dig_btnGuardar');
  var solId = btn.getAttribute('data-solicitud-id');
  var estado = document.getElementById('dig_estado_q').value;
  if (!estado) { Swal.fire({ icon: 'warning', title: 'Estado requerido', text: 'Selecciona un estado final.' }); return; }

  var estadoUpperDig = estado.toUpperCase();
  var motivoAplazDig = document.getElementById('dig_motivo_aplazamiento') ? document.getElementById('dig_motivo_aplazamiento').value : '';
  var motivoNegDig = document.getElementById('dig_motivo_negacion') ? document.getElementById('dig_motivo_negacion').value : '';
  if (estadoUpperDig.indexOf('APLAZ') !== -1 && !motivoAplazDig) {
    Swal.fire({ icon: 'warning', title: 'Motivo requerido', text: 'El motivo de aplazamiento es obligatorio.' });
    return;
  }
  if ((estadoUpperDig.indexOf('NEGAD') !== -1 || estadoUpperDig.indexOf('RECHAZ') !== -1) && !motivoNegDig) {
    Swal.fire({ icon: 'warning', title: 'Motivo requerido', text: 'El motivo de negación es obligatorio.' });
    return;
  }

  // RE-GESTIÓN: llamar función especializada sin requerir biometría ni fecha SAI
  if (window._modoRegestion) {
    var rgData = {
      solicitudId:         window._modoRegestion.solicitudId,
      tipoHoja:            window._modoRegestion.tipoHoja,
      estado_q:            estado,
      motivo_aplazamiento: motivoAplazDig,
      motivo_negacion:     motivoNegDig
    };
    if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, true); UX.showModalOverlay('modalDigital', true); }
    google.script.run
      .withSuccessHandler(function(r) {
        window._modoRegestion = null;
        if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalDigital', false); }
        if (r && r.success) {
          bootstrap.Modal.getInstance(document.getElementById('modalDigital')).hide();
          if (typeof UX !== 'undefined') UX.showToast('Re-gestión guardada exitosamente', 'success');
          cargarDatos();
        } else {
          Swal.fire({ icon: 'error', title: 'Error', text: r.message || 'Error al guardar.' });
        }
      })
      .withFailureHandler(function(e) {
        window._modoRegestion = null;
        if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalDigital', false); }
        Swal.fire({ icon: 'error', title: 'Error', text: e.message });
      })
      .regestionarCasoPendiente(rgData);
    return;
  }

  var esInduccionDig = (tipoSolicitudActual === 'induccion');
  var biometriaVal = document.getElementById('dig_biometria').value || '';
  if (!esInduccionDig && !biometriaVal) {
    Swal.fire({ icon: 'warning', title: 'Biometría requerida', text: 'Indica el resultado de biometría antes de guardar.' });
    return;
  }
  if (!esInduccionDig && !_validarFechaSaiAnteDeGuardar('dig_fecha_radicacion_sai')) return;

  var datos = {
    solicitudId: solId,
    biometria: biometriaVal,
    estado_q: estado,
    motivo_aplazamiento: motivoAplazDig,
    motivo_negacion: motivoNegDig,
    fecha_radicacion_sai: esInduccionDig ? '' : (document.getElementById('dig_fecha_radicacion_sai').value || ''),
    comentarios_gestion: document.getElementById('dig_comentarios_gestion').value || '',
    tipoSolicitudActual: tipoSolicitudActual
  };

  if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, true); UX.showModalOverlay('modalDigital', true); }

  google.script.run
    .withSuccessHandler(function(r) { if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalDigital', false); } onGuardarExitoUnificado(r, 'modalDigital', solId); })
    .withFailureHandler(function(e) { if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalDigital', false); } Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
    .guardarCambiosInternos(datos);
}

function manejarGuardarBiometria() {
  var btn = document.getElementById('bio_btnGuardar');
  var solId = document.getElementById('bio_solicitudId').value;
  var resFinal = (document.getElementById('bio_resFinal').value || '').toUpperCase();
  var resLlamada = document.getElementById('bio_resLlamada').value || '';
  var motivoAplaz = '';
  var motivoNeg = '';

  if (!resLlamada) { Swal.fire({ icon: 'warning', title: 'Campo requerido', text: 'Selecciona el resultado de la llamada.', confirmButtonColor: '#253150' }); return; }
  if (!resFinal) { Swal.fire({ icon: 'warning', title: 'Resultado requerido', text: 'Selecciona un resultado final.', confirmButtonColor: '#253150' }); return; }
  if (resFinal === 'APLAZADO') {
    var selMotivo = document.getElementById('bio_motivoAplazamiento');
    motivoAplaz = selMotivo ? selMotivo.value : '';
    if (!motivoAplaz) { Swal.fire({ icon: 'warning', title: 'Motivo requerido', text: 'Selecciona el motivo de aplazamiento.', confirmButtonColor: '#253150' }); return; }
  }
  if (resFinal === 'RECHAZADO') {
    var txtNeg = document.getElementById('bio_motivoNegacion');
    motivoNeg = txtNeg ? (txtNeg.value || '').trim() : '';
    if (!motivoNeg) { Swal.fire({ icon: 'warning', title: 'Motivo requerido', text: 'Describe el motivo de negación.', confirmButtonColor: '#253150' }); return; }
  }

  var datosForm = {
    resLlamada: resLlamada,
    resFinal: resFinal,
    motivoAplazamiento: motivoAplaz,
    motivoNegacion: motivoNeg
  };

  if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, true); UX.showModalOverlay('modalBiometria', true); }

  google.script.run
    .withSuccessHandler(function(r) { if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalBiometria', false); } onGuardarExitoUnificado(r, 'modalBiometria', solId); })
    .withFailureHandler(function(e) { if (typeof UX !== 'undefined') { UX.setBtnLoading(btn, false); UX.showModalOverlay('modalBiometria', false); } Swal.fire({ icon: 'error', title: 'Error', text: e.message }); })
    .guardarGestionBiometria(solId, datosForm);
}

function onGuardarExitoUnificado(r, modalId, solicitudId) {
  if (r && r.success === true) {
    var modalEl = document.getElementById(modalId);
    var inst = bootstrap.Modal.getInstance(modalEl);
    if (inst) inst.hide();

    if (solicitudId) _quitarFilaTabla(solicitudId);

    if (r.disparaAsignacion) {
      yaSeIntentoAsignar = true;
      _dispararAutoAsignacion();
    }

    if (typeof UX !== 'undefined' && UX.showSuccessCheck) {
      UX.showSuccessCheck(function() {
        if (typeof UX.showToast === 'function') UX.showToast('Gestión guardada correctamente', 'success');
        if (!r.disparaAsignacion) yaSeIntentoAsignar = false;
        cargarDatos();
      });
    } else {
      Swal.fire({ icon: 'success', title: 'Guardado', text: r.message || 'Gestión guardada.', timer: 2000, showConfirmButton: false });
      if (!r.disparaAsignacion) yaSeIntentoAsignar = false;
      cargarDatos();
    }
  } else {
    Swal.fire({ icon: 'error', title: 'Error', text: (r && r.message) || 'Error al guardar.' });
  }
}

function _dispararAutoAsignacion() {
  if (_pollingEnCurso) return;
  _pollingEnCurso = true;
  var fnName = window.__IS_UNIFIED_VIEW__ ? 'autoAsignarDesdeEquipo' : 'autoAsignarAlEntrar';
  google.script.run
    .withSuccessHandler(function(res) {
      _pollingEnCurso = false;
      yaSeIntentoAsignar = false;
      if (res && res.success && res.nueva) {
        if (typeof UX !== 'undefined' && UX.showToast) UX.showToast(res.message || 'Nuevo caso asignado', 'info');
        cargarDatos();
      }
    })
    .withFailureHandler(function() { _pollingEnCurso = false; yaSeIntentoAsignar = false; })
    [fnName]();
}

function abrirResumenCupos() {
  var loadEl = document.getElementById('cr_loading');
  var contEl = document.getElementById('cr_contenido');
  if (loadEl) loadEl.classList.remove('d-none');
  if (contEl) contEl.classList.add('d-none');

  var hoy = new Date();
  var opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  var fechaStr = hoy.toLocaleDateString('es-CO', opciones);
  var labelEl = document.getElementById('cr_fecha_label');
  if (labelEl) labelEl.textContent = fechaStr.charAt(0).toUpperCase() + fechaStr.slice(1);

  new bootstrap.Modal(document.getElementById('modalCuposRestantes')).show();

  google.script.run
    .withSuccessHandler(function(res) {
      if (loadEl) loadEl.classList.add('d-none');
      if (contEl) contEl.classList.remove('d-none');

      var totalRestante = res.totalLimite - res.totalUsado;
      document.getElementById('cr_total_restantes').textContent = totalRestante > 0 ? totalRestante : 0;
      document.getElementById('cr_total_detalle').textContent = res.totalUsado + ' usados de ' + res.totalLimite + ' asignados';

      var colores = [
        { bg: '#dbeafe', color: '#1d4ed8', border: '#bfdbfe' },
        { bg: '#ede9fe', color: '#7c3aed', border: '#ddd6fe' },
        { bg: '#fef3c7', color: '#b45309', border: '#fde68a' },
        { bg: '#fce7f3', color: '#be185d', border: '#fbcfe8' },
        { bg: '#dcfce7', color: '#15803d', border: '#bbf7d0' },
        { bg: '#e0e7ff', color: '#4338ca', border: '#c7d2fe' }
      ];

      var tiposRow = document.getElementById('cr_tipos_row');
      var barrasEl = document.getElementById('cr_barras');
      tiposRow.innerHTML = '';
      barrasEl.innerHTML = '';

      var activos = res.resumen.filter(function(r) { return r.limite > 0; });
      var colSize = activos.length <= 3 ? 'col-md-4' : 'col-md-4';

      activos.forEach(function(item, idx) {
        var c = colores[idx % colores.length];
        var restante = item.limite - item.usado;
        if (restante < 0) restante = 0;

        // Cards
        tiposRow.innerHTML += '<div class="' + colSize + '">' +
          '<div class="p-3 rounded-4 text-center border" style="background:' + c.bg + ';border-color:' + c.border + ' !important;">' +
          '<div style="font-size:0.68rem;font-weight:700;color:' + c.color + ';text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">' + item.tipo + '</div>' +
          '<div style="font-size:2rem;font-weight:800;color:' + c.color + ';letter-spacing:-1px;line-height:1;">' + restante + '</div>' +
          '<div style="font-size:0.7rem;color:#6c757d;margin-top:4px;">' + item.usado + ' / ' + item.limite + ' usados</div>' +
          '</div></div>';

        // Barras de progreso
        var pct = item.limite > 0 ? Math.min((item.usado / item.limite) * 100, 100) : 0;
        var barColor = pct >= 100 ? '#22c55e' : c.color;
        var statusIcon = pct >= 100 ? '<i class="bi bi-check-circle-fill text-success me-1"></i>' : '';
        barrasEl.innerHTML += '<div class="d-flex align-items-center gap-3 mb-3">' +
          '<div style="width:100px;font-size:0.8rem;font-weight:600;color:#475569;">' + statusIcon + item.tipo + '</div>' +
          '<div class="flex-fill"><div class="progress" style="height:8px;border-radius:10px;background:#f1f5f9;"><div class="progress-bar" style="width:' + pct + '%;background:' + barColor + ';border-radius:10px;transition:width 0.6s;"></div></div></div>' +
          '<div style="font-size:0.78rem;font-weight:700;color:' + (pct >= 100 ? '#16a34a' : '#475569') + ';min-width:55px;text-align:right;">' + item.usado + ' / ' + item.limite + '</div>' +
          '</div>';
      });

      if (activos.length === 0) {
        tiposRow.innerHTML = '<div class="col-12 text-center text-muted py-3">Sin cupos configurados para este equipo.</div>';
        barrasEl.innerHTML = '';
      }
    })
    .withFailureHandler(function() {
      if (loadEl) loadEl.classList.add('d-none');
      if (contEl) contEl.classList.remove('d-none');
      document.getElementById('cr_tipos_row').innerHTML = '<div class="col-12 text-center text-danger py-3">Error al consultar cupos.</div>';
    })
    .verificarMisCupos();
}

      if (res.listado && res.listado.length > 0) {
        html += '<table class="table" style="font-size:0.85rem;"><thead><tr><th>Solicitud</th><th>Tipo</th><th>Hora</th><th>Observaciones</th></tr></thead><tbody>';
        res.listado.forEach(function(item, idx) {
          var obs = item.observaciones || '';
          var obsHtml = obs
            ? '<a href="javascript:void(0)" onclick="var r=document.getElementById(\'rhs_obs_' + idx + '\');var v=r.style.display!==\'none\';r.style.display=v?\'none\':\'\';this.innerHTML=v?\'<i class=bi-chat-left-text></i> Ver comentario\':\'<i class=bi-x-circle></i> Ocultar\';" style="font-size:0.75rem;font-weight:600;color:#4338ca;text-decoration:none;"><i class="bi bi-chat-left-text"></i> Ver comentario</a>'
            : '<span class="text-muted">—</span>';
          var obsRow = obs
            ? '<tr id="rhs_obs_' + idx + '" style="display:none;"><td colspan="4" style="padding:8px 14px 12px;background:#f8fafc;border-top:none;"><div style="font-size:0.8rem;color:#334155;line-height:1.5;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;white-space:pre-wrap;word-break:break-word;">' + obs.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></td></tr>'
            : '';
          html += '<tr><td class="fw-bold text-primary">' + item.solicitud + '</td><td>' + item.tipo + '</td><td><span style="font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(37,49,80,0.07);"><i class="bi bi-clock me-1"></i>' + item.horaGestion + '</span></td><td>' + obsHtml + '</td></tr>' + obsRow;
        });
        html += '</tbody></table>';
      }
      body.innerHTML = html;
    })
    .withFailureHandler(function() {
      body.innerHTML = '<div class="text-center text-muted py-4"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2">Sin gestiones hoy.</p></div>';
    })
    .obtenerDetalleGestionesHoy();
}

// ============================================================
// LÓGICA DE RE-GESTIÓN (PEND. VALIDACIÓN / EVIDENTE)
// ============================================================

var _rgPendientes = [];
var _rgCasoActual = null;
var _rgMotivoPickers = {};

function actualizarBannerPendientes(lista) {
  _rgPendientes = lista || [];
  var banner = document.getElementById('bannerPendValidacion');
  var msg    = document.getElementById('pendValidacionMensaje');
  if (!banner) return;
  if (_rgPendientes.length === 0) {
    banner.style.display = 'none';
    return;
  }
  banner.style.display = '';
  var pv = _rgPendientes.filter(function(c) { return c.estadoQ === 'PENDIENTE VALIDACIÓN'; }).length;
  var pe = _rgPendientes.filter(function(c) { return c.estadoQ === 'PENDIENTE EVIDENTE'; }).length;
  var partes = [];
  if (pv) partes.push(pv + ' pend. validación');
  if (pe) partes.push(pe + ' pend. evidente');
  if (msg) msg.textContent = partes.join(' · ');
}

function abrirModalRegestion() {
  rgVolverLista();
  document.getElementById('rg_loading').classList.remove('d-none');
  document.getElementById('rg_lista_wrap').classList.add('d-none');
  document.getElementById('rg_empty').classList.add('d-none');
  new bootstrap.Modal(document.getElementById('modalRegestion')).show();

  google.script.run
    .withSuccessHandler(function(lista) {
      _rgPendientes = lista || [];
      actualizarBannerPendientes(_rgPendientes);
      _rgRenderLista();
    })
    .withFailureHandler(function(e) {
      console.error('abrirModalRegestion:', e);
      document.getElementById('rg_loading').classList.add('d-none');
      document.getElementById('rg_empty').classList.remove('d-none');
    })
    .obtenerCasosPendientesAnalista();
}

function _rgRenderLista() {
  document.getElementById('rg_loading').classList.add('d-none');
  if (_rgPendientes.length === 0) {
    document.getElementById('rg_empty').classList.remove('d-none');
    return;
  }
  var tbody = document.getElementById('rg_tbody');
  var rows = _rgPendientes.map(function(c, i) {
    var estadoBadge = c.estadoQ === 'PENDIENTE VALIDACIÓN'
      ? '<span style="font-size:0.7rem;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:6px;font-weight:700;">PEND. VALIDACIÓN</span>'
      : '<span style="font-size:0.7rem;background:#ede9fe;color:#5b21b6;padding:2px 8px;border-radius:6px;font-weight:700;">PEND. EVIDENTE</span>';
    var nombre = c.nombreInquilino || '<span class="text-muted">—</span>';
    return '<tr>'
      + '<td class="fw-bold text-primary" style="font-size:0.85rem;">' + (c.solicitudId || '—') + '</td>'
      + '<td style="font-size:0.82rem;">' + nombre + '</td>'
      + '<td style="font-size:0.82rem;">' + (c.clase || '—') + ' <small class="text-muted">(' + c.tipoHoja + ')</small></td>'
      + '<td>' + estadoBadge + '</td>'
      + '<td style="font-size:0.78rem;color:#706F6F;">' + (c.fechaGestion || '—') + '</td>'
      + '<td><button class="btn btn-sm fw-bold" style="background:#d97706;color:#fff;border-radius:7px;border:none;font-size:0.75rem;" onclick="_rgAbrirForm(' + i + ')"><i class="bi bi-pencil-fill me-1"></i>Gestionar</button></td>'
      + '</tr>';
  });
  tbody.innerHTML = rows.join('');
  document.getElementById('rg_lista_wrap').classList.remove('d-none');
}

function _rgAbrirForm(idx) {
  var caso = _rgPendientes[idx];
  if (!caso || !caso.filaCompleta) return;

  window._modoRegestion = { solicitudId: caso.solicitudId, tipoHoja: caso.tipoHoja };

  var modalRg = bootstrap.Modal.getInstance(document.getElementById('modalRegestion'));
  if (modalRg) modalRg.hide();

  if (caso.tipoHoja === 'REESTUDIO') {
    poblarModalRst(caso.filaCompleta);
    new bootstrap.Modal(document.getElementById('modalReestudio')).show();
  } else {
    tipoSolicitudActual = caso.clase.toLowerCase().includes('reestudio') ? 'reestudio' : 'digital';
    poblarModalDig(caso.filaCompleta);
    document.getElementById('dig_btnGuardar').setAttribute('data-solicitud-id', caso.solicitudId);
    new bootstrap.Modal(document.getElementById('modalDigital')).show();
  }
}

function rgVolverLista() {
  _rgCasoActual = null;
}

</script>
