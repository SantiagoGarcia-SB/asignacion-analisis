<style>
/* ===== UX ENHANCEMENTS - Shared Styles ===== */

/* 1. Toast notifications */
.toast-ux {
    position: fixed;
    top: 90px;
    right: 24px;
    z-index: 99998;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
}
.toast-ux-item {
    pointer-events: auto;
    background: white;
    border-radius: 14px;
    padding: 14px 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-main);
    animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    transition: all 0.3s ease;
    max-width: 360px;
}
.toast-ux-item.toast-exit {
    opacity: 0;
    transform: translateX(100%);
}
.toast-ux-item .toast-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
}
.toast-icon.success { background: rgba(34,197,94,0.1); color: #16a34a; }
.toast-icon.info { background: rgba(59,130,246,0.1); color: #2563eb; }
.toast-icon.warning { background: rgba(245,158,11,0.1); color: #d97706; }
@keyframes toastSlideIn {
    from { opacity: 0; transform: translateX(60px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
}

/* 2. Button loading states */
.btn-loading {
    position: relative;
    pointer-events: none;
    opacity: 0.85;
}
.btn-loading::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: btnSpin 0.6s linear infinite;
    right: 16px;
    top: 50%;
    margin-top: -8px;
}
@keyframes btnSpin { to { transform: rotate(360deg); } }

/* 3. Skeleton loaders for table */
.skeleton-row {
    animation: skeletonPulse 1.5s ease-in-out infinite;
}
.skeleton-cell {
    height: 14px;
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
    background-size: 200% 100%;
    animation: skeletonShimmer 1.5s ease-in-out infinite;
    border-radius: 6px;
    width: 80%;
}
@keyframes skeletonShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
@keyframes skeletonPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

/* 4. Empty state */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    animation: emptyFadeIn 0.5s ease;
}
.empty-state-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, rgba(37,49,80,0.05), rgba(189,15,20,0.05));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--text-muted);
    margin-bottom: 16px;
}
.empty-state-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 6px;
}
.empty-state-text {
    font-size: 0.85rem;
    color: var(--text-muted);
    max-width: 300px;
    margin: 0 auto;
}
@keyframes emptyFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 5. Metric card click interaction */
.card-metrica {
    cursor: pointer;
    position: relative;
    overflow: hidden;
}
.card-metrica::after {
    content: '';
    position: absolute;
    top: 12px; right: 12px;
    width: 24px; height: 24px;
    background: rgba(37,49,80,0.06);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s;
}
.card-metrica:hover::after {
    opacity: 1;
}
.card-metrica .metric-hint {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 4px;
    opacity: 0;
    transition: opacity 0.2s;
}
.card-metrica:hover .metric-hint {
    opacity: 1;
}

/* 6. Conditional fields slide animation */
.campo-condicional {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.3s ease, margin 0.3s ease;
    margin-top: 0;
}
.campo-condicional.visible {
    max-height: 200px;
    opacity: 1;
    margin-top: 1rem;
}

/* 7. Last sync indicator */
.sync-indicator {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}
.sync-indicator .sync-dot {
    width: 6px; height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: syncPulse 2s ease-in-out infinite;
}
@keyframes syncPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* 8. Row fade out after management */
.row-managed {
    animation: rowFadeOut 0.6s ease forwards;
}
@keyframes rowFadeOut {
    0% { opacity: 1; transform: translateX(0); }
    100% { opacity: 0; transform: translateX(-20px); }
}

/* 9. Success check animation */
.success-check-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(4px);
    animation: overlayIn 0.3s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.success-check-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: checkBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    box-shadow: 0 20px 60px rgba(34,197,94,0.3);
}
.success-check-circle i {
    font-size: 2.5rem;
    color: white;
}
@keyframes checkBounce {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

/* 10. Metric modal - activity summary */
.activity-modal .modal-content {
    border-radius: 20px !important;
    border: none !important;
    overflow: hidden;
}
.activity-header {
    background: var(--grad-azul);
    padding: 24px 28px;
    color: white;
    position: relative;
    overflow: hidden;
}
.activity-header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(189,15,20,0.2), transparent 70%);
    border-radius: 50%;
}
.activity-list {
    max-height: 400px;
    overflow-y: auto;
    padding: 0;
}
.activity-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
}
.activity-item:hover {
    background: #fafbff;
}
.activity-item:last-child {
    border-bottom: none;
}
.activity-time {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 700;
    min-width: 50px;
    padding-top: 2px;
}
.activity-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
}
.activity-dot.aprobada { background: #22c55e; }
.activity-dot.negada { background: #ef4444; }
.activity-dot.aplazada { background: #f59e0b; }
.activity-dot.pendiente { background: #6366f1; }
.activity-dot.default { background: #94a3b8; }
.activity-content {
    flex: 1;
}
.activity-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 2px;
}
.activity-desc {
    font-size: 0.75rem;
    color: var(--text-muted);
}

/* 11. Tooltip for action buttons */
.btn-action[title] {
    position: relative;
}
.btn-action[title]::before {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    background: var(--color-secundario);
    color: white;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37,49,80,0.2);
}
.btn-action[title]:hover::before {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

/* 12. Keyboard shortcut badge */
.kbd-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    margin-left: 8px;
}
.kbd-badge kbd {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 0.6rem;
    font-family: 'Manrope', sans-serif;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>

<div class="toast-ux" id="toastContainer"></div>

<script>
// ===== UX ENHANCEMENTS MODULE =====
const UX = (function() {

    // -- Activity log stored in sessionStorage --
    const ACTIVITY_KEY = 'ux_activity_log';

    function getActivityLog() {
        try {
            return JSON.parse(sessionStorage.getItem(ACTIVITY_KEY) || '[]');
        } catch(e) { return []; }
    }

    function logActivity(solicitud, estado, detalle) {
        const log = getActivityLog();
        log.unshift({
            solicitud: solicitud,
            estado: estado,
            detalle: detalle || '',
            hora: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
        });
        // Keep max 50 entries
        if (log.length > 50) log.length = 50;
        sessionStorage.setItem(ACTIVITY_KEY, JSON.stringify(log));
    }

    // -- Toast system --
    function showToast(message, type) {
        type = type || 'info';
        const container = document.getElementById('toastContainer');
        if (!container) return;
        
        const icons = {
            success: '<i class="bi bi-check-circle-fill"></i>',
            info: '<i class="bi bi-info-circle-fill"></i>',
            warning: '<i class="bi bi-exclamation-triangle-fill"></i>'
        };

        const toast = document.createElement('div');
        toast.className = 'toast-ux-item';
        toast.innerHTML = `
            <div class="toast-icon ${type}">${icons[type] || icons.info}</div>
            <span>${message}</span>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    // -- Success animation --
    function showSuccessCheck(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'success-check-overlay';
        overlay.innerHTML = '<div class="success-check-circle"><i class="bi bi-check-lg"></i></div>';
        document.body.appendChild(overlay);
        
        setTimeout(() => {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                overlay.remove();
                if (callback) callback();
            }, 300);
        }, 1200);
    }

    // -- Button loading state --
    function setBtnLoading(btn, loading) {
        if (!btn) return;
        if (loading) {
            btn._originalText = btn.innerHTML;
            btn.classList.add('btn-loading');
            btn.disabled = true;
            const text = btn.querySelector('i') ? 'Guardando...' : btn.textContent;
            btn.innerHTML = '<i class="bi bi-arrow-repeat me-2" style="animation: btnSpin 0.6s linear infinite;"></i>' + 'Procesando...';
        } else {
            btn.classList.remove('btn-loading');
            btn.disabled = false;
            if (btn._originalText) btn.innerHTML = btn._originalText;
        }
    }

    // -- Animate number with counter effect --
    function animateNumber(elementId, target) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const current = parseInt(el.textContent) || 0;
        const diff = target - current;
        if (diff === 0) return;
        
        const duration = 800;
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
            el.textContent = Math.round(current + diff * eased);
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    // -- Empty state HTML --
    function getEmptyStateHTML(moduleName) {
        const msgs = {
            'solicitudes': { icon: 'bi-inbox', title: 'Sin solicitudes pendientes', text: 'Todas las solicitudes han sido gestionadas. Se asignarán nuevas automáticamente.' },
            'biometria': { icon: 'bi-fingerprint', title: 'Sin biometrías pendientes', text: 'No hay registros de biometría por gestionar en este momento.' },
            'reestudios': { icon: 'bi-layers', title: 'Sin reestudios pendientes', text: 'No hay casos de reestudio asignados actualmente.' }
        };
        const m = msgs[moduleName] || msgs['solicitudes'];
        return `
            <div class="empty-state">
                <div class="empty-state-icon"><i class="bi ${m.icon}"></i></div>
                <div class="empty-state-title">${m.title}</div>
                <div class="empty-state-text">${m.text}</div>
            </div>`;
    }

    // -- Skeleton loader for table --
    function getSkeletonHTML(cols, rows) {
        cols = cols || 4;
        rows = rows || 5;
        let html = '<tbody>';
        for (let i = 0; i < rows; i++) {
            html += '<tr class="skeleton-row">';
            for (let j = 0; j < cols; j++) {
                const w = 50 + Math.random() * 40;
                html += `<td><div class="skeleton-cell" style="width:${w}%"></div></td>`;
            }
            html += '</tr>';
        }
        html += '</tbody>';
        return html;
    }

    // -- Show activity modal (using SweetAlert to avoid Bootstrap modal backdrop issues) --
    function showActivityModal() {
        const log = getActivityLog();
        const realCount = parseInt(document.getElementById('countHoy')?.textContent) || 0;

        let htmlContent = '';

        if (log.length === 0) {
            if (realCount > 0) {
                htmlContent = `<div style="text-align:center;padding:20px;"><p style="font-size:2rem;margin:0;">${realCount}</p><p style="color:#64748b;font-size:0.85rem;">gestiones hoy</p><p style="color:#94a3b8;font-size:0.75rem;">El detalle se registra a partir de esta sesión</p></div>`;
            } else {
                htmlContent = `<div style="text-align:center;padding:20px;"><i class="bi bi-journal-text" style="font-size:2rem;color:#94a3b8;"></i><p style="color:#64748b;margin-top:10px;font-size:0.85rem;">Sin actividad registrada aún</p></div>`;
            }
        } else {
            let items = log.map(item => {
                const dotColor = getDotColor(item.estado);
                return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9;">
                    <span style="font-size:0.7rem;color:#94a3b8;font-weight:700;min-width:55px;padding-top:2px;">${item.hora}</span>
                    <div style="width:10px;height:10px;border-radius:50%;background:${dotColor};margin-top:5px;flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div style="font-size:0.85rem;font-weight:700;color:#111827;">Sol. ${item.solicitud} → ${item.estado}</div>
                        ${item.detalle ? `<div style="font-size:0.75rem;color:#64748b;">${item.detalle}</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            let summaryParts = [];
            const aprobadas = log.filter(l => l.estado.toUpperCase().includes('APROB')).length;
            const negadas = log.filter(l => l.estado.toUpperCase().includes('NEGAD')).length;
            const aplazadas = log.filter(l => l.estado.toUpperCase().includes('APLAZ')).length;
            if (aprobadas) summaryParts.push('✅ ' + aprobadas + ' aprobada' + (aprobadas > 1 ? 's' : ''));
            if (negadas) summaryParts.push('❌ ' + negadas + ' negada' + (negadas > 1 ? 's' : ''));
            if (aplazadas) summaryParts.push('⏸️ ' + aplazadas + ' aplazada' + (aplazadas > 1 ? 's' : ''));

            let header = realCount > log.length 
                ? `<p style="font-size:0.75rem;color:#94a3b8;margin-bottom:12px;">${log.length} de ${realCount} gestiones registradas en esta sesión</p>`
                : '';

            htmlContent = `${header}<div style="max-height:350px;overflow-y:auto;">${items}</div>
                <div style="margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:0.75rem;color:#64748b;font-weight:700;">${summaryParts.join(' · ')}</div>`;
        }

        Swal.fire({
            title: '<i class="bi bi-check2-all me-2"></i>Mi Actividad del Día',
            html: htmlContent,
            showConfirmButton: true,
            confirmButtonText: 'Cerrar',
            confirmButtonColor: '#253150',
            width: 480,
            customClass: { popup: 'rounded-4' }
        });
    }

    function getDotColor(estado) {
        const s = (estado || '').toUpperCase();
        if (s.includes('APROB')) return '#22c55e';
        if (s.includes('NEGAD')) return '#ef4444';
        if (s.includes('APLAZ')) return '#f59e0b';
        if (s.includes('PENDIENTE')) return '#6366f1';
        return '#94a3b8';
    }

    // -- Keyboard shortcuts --
    function initKeyboardShortcuts() {
        document.addEventListener('keydown', function(e) {
            // Enter to save when modal is open
            if (e.key === 'Enter' && e.ctrlKey) {
                const btn = document.getElementById('btnGuardarCambios');
                if (btn && !btn.disabled) {
                    const modal = document.querySelector('.modal.show');
                    if (modal) {
                        e.preventDefault();
                        btn.click();
                    }
                }
            }
        });
    }

    // -- Last sync indicator --
    let lastSyncTime = null;
    function updateSyncTime() {
        lastSyncTime = new Date();
        const el = document.getElementById('syncTime');
        if (el) {
            el.textContent = lastSyncTime.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        }
    }

    // -- Init --
    function init() {
        initKeyboardShortcuts();
        updateSyncTime();
        
        // Make metric cards clickable - differentiate by card type
        setTimeout(function() {
            document.querySelectorAll('.card-metrica').forEach((card, index) => {
                card.addEventListener('click', function(e) {
                    e.stopPropagation();
                    try {
                        if (index === 0) {
                            showActivityModal();
                        } else {
                            showPendingModal();
                        }
                    } catch(err) {
                        console.warn('UX modal error:', err);
                    }
                });
            });
        }, 500);
    }

    // -- Show pending items modal (using SweetAlert) --
    function showPendingModal() {
        // Gather pending data from global cache variables depending on the view
        let pendingItems = [];
        
        if (typeof cacheSolicitudes !== 'undefined' && Array.isArray(cacheSolicitudes) && cacheSolicitudes.length > 0 && typeof cacheSolicitudes[0] === 'object' && cacheSolicitudes[0].solicitud) {
            // VistaReestudios format (array of objects)
            pendingItems = cacheSolicitudes.map(item => ({
                id: item.solicitud || '—',
                tipo: item.tipoProceso || item.origen || '',
                fecha: item.fechaAsignacion || item.fechaRadicacion || ''
            }));
        } else if (typeof rawData !== 'undefined' && Array.isArray(rawData) && rawData.length > 0) {
            // VistaBiometria format (array of arrays)
            pendingItems = rawData.map(item => ({
                id: item[6] || item[0] || '—',
                tipo: 'Biometría',
                fecha: item[0] || ''
            }));
        } else if (typeof datosGlobales !== 'undefined' && Array.isArray(datosGlobales) && datosGlobales.length > 1) {
            // index.html format (array of arrays, first row is header)
            const rows = datosGlobales.slice(1);
            pendingItems = rows.map(item => ({
                id: item[0] || '—',
                tipo: String(item[16] || 'Estudio').substring(0, 20),
                fecha: item[17] || ''
            }));
        }

        let htmlContent = '';

        if (pendingItems.length === 0) {
            htmlContent = `<div style="text-align:center;padding:20px;"><i class="bi bi-check-all" style="font-size:2.5rem;color:#22c55e;"></i><p style="font-weight:800;margin-top:10px;color:#111827;">¡Todo al día!</p><p style="color:#64748b;font-size:0.85rem;">No tienes solicitudes pendientes por gestionar.</p></div>`;
        } else {
            let items = pendingItems.map((item, idx) => {
                return `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9;">
                    <span style="font-size:0.7rem;color:#94a3b8;font-weight:700;min-width:30px;padding-top:2px;">#${idx + 1}</span>
                    <div style="width:10px;height:10px;border-radius:50%;background:#6366f1;margin-top:5px;flex-shrink:0;"></div>
                    <div style="flex:1;">
                        <div style="font-size:0.85rem;font-weight:700;color:#111827;">Sol. ${item.id}</div>
                        <div style="font-size:0.75rem;color:#64748b;">${item.tipo}${item.fecha ? ' · ' + item.fecha : ''}</div>
                    </div>
                </div>`;
            }).join('');

            htmlContent = `<div style="max-height:350px;overflow-y:auto;">${items}</div>
                <div style="margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:0.75rem;color:#64748b;font-weight:700;">${pendingItems.length} solicitud${pendingItems.length > 1 ? 'es' : ''} pendiente${pendingItems.length > 1 ? 's' : ''}</div>`;
        }

        Swal.fire({
            title: '<i class="bi bi-hourglass-split me-2"></i>Solicitudes Pendientes',
            html: htmlContent,
            showConfirmButton: true,
            confirmButtonText: 'Cerrar',
            confirmButtonColor: '#BD0F14',
            width: 480,
            customClass: { popup: 'rounded-4' }
        });
    }

    // Public API
    return {
        init: init,
        showToast: showToast,
        showSuccessCheck: showSuccessCheck,
        setBtnLoading: setBtnLoading,
        animateNumber: animateNumber,
        getEmptyStateHTML: getEmptyStateHTML,
        getSkeletonHTML: getSkeletonHTML,
        logActivity: logActivity,
        showActivityModal: showActivityModal,
        showPendingModal: showPendingModal,
        updateSyncTime: updateSyncTime
    };
})();

// Auto-init when DOM is ready
document.addEventListener('DOMContentLoaded', function() {
    UX.init();
});
</script>
