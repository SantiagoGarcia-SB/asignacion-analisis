<style>
/* ===== UX ENHANCEMENTS - Shared Styles ===== */

/* 1. Toast notifications */
.toast-ux {
    position: fixed;
    top: 90px;
    right: 24px;
    z-index: 99998;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
}
.toast-ux-item {
    pointer-events: auto;
    background: white;
    border-radius: 14px;
    padding: 14px 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-main);
    animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
    transition: all 0.3s ease;
    max-width: 360px;
}
.toast-ux-item.toast-exit {
    opacity: 0;
    transform: translateX(100%);
}
.toast-ux-item .toast-icon {
    width: 32px; height: 32px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
}
.toast-icon.success { background: rgba(34,197,94,0.1); color: #16a34a; }
.toast-icon.info { background: rgba(59,130,246,0.1); color: #2563eb; }
.toast-icon.warning { background: rgba(245,158,11,0.1); color: #d97706; }
@keyframes toastSlideIn {
    from { opacity: 0; transform: translateX(60px) scale(0.9); }
    to { opacity: 1; transform: translateX(0) scale(1); }
}

/* 2. Button loading states */
.btn-loading {
    position: relative;
    pointer-events: none;
    opacity: 0.85;
}
.btn-loading::after {
    content: '';

    width: 16px; height: 16px;

/* 3. Skeleton loaders for table */

<div class="toast-ux" id="toastContainer"></div>

<script>
// ===== UX ENHANCEMENTS MODULE =====
const UX = (function() {

    // -- Activity log stored in sessionStorage --
    const ACTIVITY_KEY = 'ux_activity_log';

    function getActivityLog() {
        try {
            return JSON.parse(sessionStorage.getItem(ACTIVITY_KEY) || '[]');
        } catch(e) { return []; }
    }

    function logActivity(solicitud, estado, detalle) {
        const log = getActivityLog();
        log.unshift({
            solicitud: solicitud,
            estado: estado,
            detalle: detalle || '',
            hora: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
        });
        // Keep max 50 entries
        if (log.length > 50) log.length = 50;
        sessionStorage.setItem(ACTIVITY_KEY, JSON.stringify(log));
    }

    // -- Toast system --
    function showToast(message, type) {
        type = type || 'info';
        const container = document.getElementById('toastContainer');
        if (!container) return;
        
        const icons = {
            success: '<i class="bi bi-check-circle-fill"></i>',
            info: '<i class="bi bi-info-circle-fill"></i>',
            warning: '<i class="bi bi-exclamation-triangle-fill"></i>'
        };

        const toast = document.createElement('div');
        toast.className = 'toast-ux-item';
        toast.innerHTML = `
            <div class="toast-icon ${type}">${icons[type] || icons.info}</div>
            <span>${message}</span>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 3500);
    }

    // -- Success animation --
    function showSuccessCheck(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'success-check-overlay';
        overlay.innerHTML = '<div class="success-check-circle"><i class="bi bi-check-lg"></i></div>';
        document.body.appendChild(overlay);
        
        setTimeout(() => {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                overlay.remove();
                if (callback) callback();
            }, 300);
        }, 1200);
    }

    // -- Button loading state --
    function setBtnLoading(btn, loading) {
        if (!btn) return;
        if (loading) {
            btn._originalText = btn.innerHTML;
            btn.classList.add('btn-loading');
            btn.disabled = true;
            const text = btn.querySelector('i') ? 'Guardando...' : btn.textContent;
            btn.innerHTML = '<i class="bi bi-arrow-repeat me-2" style="animation: btnSpin 0.6s linear infinite;"></i>' + 'Procesando...';
        } else {
            btn.classList.remove('btn-loading');
            btn.disabled = false;
            if (btn._originalText) btn.innerHTML = btn._originalText;
        }
    }

    // -- Modal saving overlay --
    function showModalOverlay(modalId, show) {
        var modalEl = document.getElementById(modalId);
        if (!modalEl) return;
        var content = modalEl.querySelector('.modal-content');
        if (!content) return;

        var existing = content.querySelector('.ux-saving-overlay');
        if (!show) {
            if (existing) {
                existing.style.opacity = '0';
                setTimeout(function() { existing.remove(); }, 300);
            }
            var cancelBtn = modalEl.querySelector('[data-bs-dismiss="modal"]');
            if (cancelBtn) cancelBtn.disabled = false;
            return;
        }

        if (existing) return;

        var cancelBtn = modalEl.querySelector('[data-bs-dismiss="modal"]');
        if (cancelBtn) cancelBtn.disabled = true;

        var overlay = document.createElement('div');
        overlay.className = 'ux-saving-overlay';
        overlay.style.cssText = 'position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.92);border-radius:20px;opacity:0;transition:opacity 0.3s;';
        overlay.innerHTML = ''
            + '<div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#253150,#3b5998);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 16px rgba(37,49,80,0.25);">'
            + '  <i class="bi bi-cloud-arrow-up-fill" style="color:white;font-size:1.6rem;animation:uxPulse 1.2s ease-in-out infinite;"></i>'
            + '</div>'
            + '<div style="font-weight:700;font-size:1.05rem;color:#253150;margin-bottom:4px;">Guardando gestión</div>'
            + '<div style="color:#706F6F;font-size:0.85rem;">Espera un momento por favor...</div>'
            + '<div style="margin-top:16px;width:120px;height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;">'
            + '  <div style="height:100%;width:30%;background:linear-gradient(90deg,#253150,#3b5998);border-radius:4px;animation:uxBarSlide 1.5s ease-in-out infinite;"></div>'
            + '</div>';
        content.style.position = 'relative';
        content.appendChild(overlay);
        requestAnimationFrame(function() { overlay.style.opacity = '1'; });
    }

    // -- Animate number with counter effect --
    function animateNumber(elementId, target) {
        const el = document.getElementById(elementId);
        if (!el) return;
        const current = parseInt(el.textContent) || 0;
        const diff = target - current;
        if (diff === 0) return;
        
        const duration = 800;
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
            el.textContent = Math.round(current + diff * eased);
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    // -- Empty state HTML --
    function getEmptyStateHTML(moduleName) {
        const msgs = {
            'solicitudes': { icon: 'bi-inbox', title: 'Sin solicitudes pendientes', text: 'Todas las solicitudes han sido gestionadas. Se asignarán nuevas automáticamente.' },
            'biometria': { icon: 'bi-fingerprint', title: 'Sin biometrías pendientes', text: 'No hay registros de biometría por gestionar en este momento.' },
            'reestudios': { icon: 'bi-layers', title: 'Sin reestudios pendientes', text: 'No hay casos de reestudio asignados actualmente.' }
        };
        const m = msgs[moduleName] || msgs['solicitudes'];
        return `
            <div class="empty-state">
                <div class="empty-state-icon"><i class="bi ${m.icon}"></i></div>
                <div class="empty-state-title">${m.title}</div>

    // -- Skeleton loader for table --
    function getSkeletonHTML(cols, rows) {

        rows = rows || 5;
        let html = '<tbody>';
        for (let i = 0; i < rows; i++) {
            html += '<tr class="skeleton-row">';
            for (let j = 0; j < cols; j++) {
                const w = 50 + Math.random() * 40;
                html += `<td><div class="skeleton-cell" style="width:${w}%"></div></td>`;

    function getDotColor(estado) {
        const s = (estado || '').toUpperCase();
        if (s.includes('APROB')) return '#22c55e';
        if (s.includes('NEGAD') || s.includes('RECHAZ')) return '#ef4444';

    // -- Keyboard shortcuts --
    function initKeyboardShortcuts() {

        let htmlContent = '';

                <div style="margin-top:12px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:0.75rem;color:#706F6F;font-weight:700;">${pendingItems.length} solicitud${pendingItems.length > 1 ? 'es' : ''} pendiente${pendingItems.length > 1 ? 's' : ''}</div>`;

    // -- Modern Alert System --
    var _alertIcons = {
        warning: { bi: 'bi-exclamation-triangle-fill', cls: 'swal-ux-warning' },

    function _buildIconHTML(type) {
        var cfg = _alertIcons[type] || _alertIcons.info;

    function alert(opts) {

        var bodyText = opts.html || opts.text || '';

        return Swal.fire({
            html: iconHtml + (bodyText ? '<div style="padding:0 28px 4px;font-size:0.88rem;color:#706F6F;line-height:1.6;font-weight:500;">' + bodyText + '</div>' : ''),
            title: opts.title || '',
            showConfirmButton: opts.showConfirmButton !== false,
            confirmButtonText: opts.confirmButtonText || 'Entendido',
            confirmButtonColor: opts.confirmButtonColor || '#253150',
            showCancelButton: opts.showCancelButton || false,
            cancelButtonText: opts.cancelButtonText || 'Cancelar',
            timer: opts.timer || undefined,
            timerProgressBar: opts.timerProgressBar || false,
            allowOutsideClick: opts.allowOutsideClick !== false,
            width: opts.width || 400,
            customClass: { popup: 'swal-ux', backdrop: 'swal-ux-backdrop' }
        });

    function alertLoading(title, subtitle) {
        return Swal.fire({
            html: '<div class="swal-ux-loader"><div class="swal-ux-spinner"></div><div class="swal-ux-loader-text">' + (title || 'Procesando...') + '</div>' + (subtitle ? '<div class="swal-ux-loader-sub">' + subtitle + '</div>' : '') + '</div>',
            showConfirmButton: false,
            allowOutsideClick: false,
            width: 360,
            customClass: { popup: 'swal-ux-loading', backdrop: 'swal-ux-backdrop' }
        });
    }

    function alertToast(title, type) {
        type = type || 'info';
        return Swal.fire({
            toast: true,
            position: 'top-end',
            icon: type,
            title: title,
            showConfirmButton: false,
            timer: type === 'warning' ? 5000 : 3000,
            timerProgressBar: true,
            customClass: { popup: 'swal-ux-toast' }
        });
    }

    // Public API
    return {
        init: init,
        showToast: showToast,
        showSuccessCheck: showSuccessCheck,
        setBtnLoading: setBtnLoading,
        showModalOverlay: showModalOverlay,
        animateNumber: animateNumber,
        getEmptyStateHTML: getEmptyStateHTML,
        getSkeletonHTML: getSkeletonHTML,
        logActivity: logActivity,
        showActivityModal: showActivityModal,
        showPendingModal: showPendingModal,
        updateSyncTime: updateSyncTime,
        alert: alert,
        alertLoading: alertLoading,
        alertToast: alertToast
    };
})();

// ===== Notification Sound System (Web Audio API) =====
const NotifSound = (function() {
    var _ctx = null;

    function getCtx() {
        if (!_ctx) {
            try { _ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            catch(e) { return null; }
        }
        if (_ctx && _ctx.state === 'suspended') _ctx.resume();
        return _ctx;
    }

    function playNote(ctx, master, freq, startTime, dur, type) {
        var osc = ctx.createOscillator();
        var env = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0, startTime);
        env.gain.linearRampToValueAtTime(1, startTime + 0.02);
        env.gain.exponentialRampToValueAtTime(0.3, startTime + dur * 0.4);
        env.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
        osc.connect(env);
        env.connect(master);
        osc.start(startTime);
        osc.stop(startTime + dur + 0.05);
    }

    function playChord(notes, volume) {
        var ctx = getCtx();
        if (!ctx) return;
        var master = ctx.createGain();
        master.gain.value = volume || 0.08;
        master.connect(ctx.destination);
        var t = ctx.currentTime + 0.01;
        notes.forEach(function(n) {
            playNote(ctx, master, n.freq, t + (n.delay || 0), n.dur || 0.35, n.type);
            if (n.harmonic) {
                playNote(ctx, master, n.freq * 2, t + (n.delay || 0), (n.dur || 0.35) * 0.6, 'sine');
            }
        });
    }

    return {
        success: function() {
            playChord([
                { freq: 1174.66, delay: 0,    dur: 0.25, harmonic: true },
                { freq: 1396.91, delay: 0.12, dur: 0.25, harmonic: true },
                { freq: 1760,    delay: 0.24, dur: 0.4,  harmonic: true }
            ], 0.07);
        },
        info: function() {
            playChord([
                { freq: 880,     delay: 0,    dur: 0.18, harmonic: true },
                { freq: 1108.73, delay: 0.15, dur: 0.18, harmonic: true },
                { freq: 1318.51, delay: 0.30, dur: 0.30, harmonic: true }
            ], 0.06);
        },
        warning: function() {
            playChord([
                { freq: 739.99, delay: 0,    dur: 0.2 },
                { freq: 659.25, delay: 0.18, dur: 0.3 }
            ], 0.08);
        },
        error: function() {
            playChord([
                { freq: 466.16, delay: 0,    dur: 0.15 },
                { freq: 415.30, delay: 0.12, dur: 0.15 },
                { freq: 349.23, delay: 0.24, dur: 0.35 }
            ], 0.08);
        },
        play: function(type) {
            var fn = this[type];
            if (fn) fn();
            else this.info();
        },
        warmUp: function() { getCtx(); }
    };
})();

// Warm up AudioContext on first user interaction so async sounds work later
(function() {
    function onFirstInteraction() {
        NotifSound.warmUp();
        document.removeEventListener('click', onFirstInteraction, true);
        document.removeEventListener('keydown', onFirstInteraction, true);
    }
    document.addEventListener('click', onFirstInteraction, true);
    document.addEventListener('keydown', onFirstInteraction, true);
})();

// ===== Global Swal Override — applies modern theme to ALL Swal.fire calls =====
(function() {
    if (typeof Swal === 'undefined') return;
    var _origFire = Swal.fire.bind(Swal);

    var _iconMap = {
        warning: { bi: 'bi-exclamation-triangle-fill', cls: 'swal-ux-warning' },
        error:   { bi: 'bi-x-circle-fill',             cls: 'swal-ux-error' },
        success: { bi: 'bi-check-circle-fill',          cls: 'swal-ux-success' },
        info:    { bi: 'bi-info-circle-fill',            cls: 'swal-ux-info' }
    };

    function cloneOpts(src) {
        var o = {};
        for (var k in src) { if (src.hasOwnProperty(k)) o[k] = src[k]; }
        return o;
    }

    Swal.fire = function() {
        var raw, opts;
        if (arguments.length >= 2 && typeof arguments[0] === 'string') {
            raw = { title: arguments[0], html: arguments[1], icon: arguments[2] || 'info' };
        } else {
            raw = arguments[0] || {};
        }
        opts = cloneOpts(raw);

        if (opts.toast) {
            opts.customClass = Object.assign({}, opts.customClass, {
                popup: ((opts.customClass && opts.customClass.popup || '') + ' swal-ux-toast').trim()
            });
            try { NotifSound.play(opts.icon || 'info'); } catch(e) {}
            return _origFire(opts);
        }

        if (opts.didOpen && !opts.icon) {
            opts.customClass = Object.assign({}, opts.customClass, {
                popup: ((opts.customClass && opts.customClass.popup || '') + ' swal-ux-loading').trim(),
                backdrop: 'swal-ux-backdrop'
            });
            if (!opts.html || !opts.html.includes('swal-ux-loader')) {
                var loadTitle = opts.title || 'Procesando...';
                var loadSub = opts.html || '';
                opts.title = '';
                opts.html = '<div class="swal-ux-loader"><div class="swal-ux-spinner"></div><div class="swal-ux-loader-text">' + loadTitle + '</div>' + (loadSub ? '<div class="swal-ux-loader-sub">' + loadSub + '</div>' : '') + '</div>';
            }
            return _origFire(opts);
        }

        var type = opts.icon;
        if (type) { try { NotifSound.play(type); } catch(e) {} }
        if (type && _iconMap[type]) {
            var cfg = _iconMap[type];
            var iconBlock = '<div class="swal-ux-header"><div class="swal-ux-icon-wrap ' + cfg.cls + '"><i class="bi ' + cfg.bi + '"></i></div></div>';
            var body = opts.html || opts.text || '';
            if (opts.text) { body = '<span>' + body + '</span>'; delete opts.text; }

            opts.html = iconBlock + (body ? '<div style="padding:0 28px 4px;font-size:0.88rem;color:#706F6F;line-height:1.6;font-weight:500;">' + body + '</div>' : '');
            delete opts.icon;
            opts.confirmButtonColor = opts.confirmButtonColor || '#253150';
            opts.confirmButtonText = opts.confirmButtonText || 'Entendido';
            opts.customClass = Object.assign({}, opts.customClass, {
                popup: ((opts.customClass && opts.customClass.popup || '') + ' swal-ux').trim(),
                backdrop: 'swal-ux-backdrop'
            });
            opts.width = opts.width || 400;
        }

        return _origFire(opts);
    };
})();

// ===== MotivoPicker — searchable select component =====
const MotivoPicker = (function() {
    const _state = {};

    function init(wrapperId, hiddenSelectId) {
        const wrapper   = document.getElementById(wrapperId);
        const select    = document.getElementById(hiddenSelectId);
        if (!wrapper || !select) return;

        const textInput = wrapper.querySelector('.motivo-picker-input');
        const dropdown  = wrapper.querySelector('.motivo-picker-dropdown');
        const clearBtn  = wrapper.querySelector('.motivo-picker-clear');
        const entry     = { wrapper, select, textInput, dropdown, clearBtn };
        _state[hiddenSelectId] = entry;

        function getOpts() {
            return Array.from(select.options).filter(function(o) { return o.value !== ''; });
        }

        function buildList(filterText) {
            const q = (filterText || '').toLowerCase().trim();
            dropdown.innerHTML = '';
            const currentVal = select.value;
            let visible = 0;

            getOpts().forEach(function(opt) {
                if (q && !opt.text.toLowerCase().includes(q)) return;
                visible++;
                const div = document.createElement('div');
                div.className = 'motivo-picker-option' + (opt.value === currentVal ? ' mp-selected' : '');
                div.textContent = opt.text;
                div.dataset.mpValue = opt.value;
                div.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    pick(opt.value, opt.text);
                });
                dropdown.appendChild(div);
            });

            if (visible === 0) {
                const em = document.createElement('div');
                em.className = 'motivo-picker-empty';
                em.textContent = 'Sin resultados';
                dropdown.appendChild(em);
            }
        }

        function pick(value, label) {
            select.value = value;
            textInput.value = label;
            clearBtn.style.display = 'flex';
            dropdown.classList.remove('mp-open');
            select.dispatchEvent(new Event('change', { bubbles: true }));
        }

        function clear() {
            select.value = '';
            textInput.value = '';
            clearBtn.style.display = 'none';
            dropdown.classList.remove('mp-open');
            select.dispatchEvent(new Event('change', { bubbles: true }));
        }

        entry._pick  = pick;
        entry._clear = clear;

        textInput.addEventListener('focus', function() {
            buildList(this.value);
            dropdown.classList.add('mp-open');
        });

        textInput.addEventListener('input', function() {
            if (select.value) { select.value = ''; clearBtn.style.display = 'none'; }
            buildList(this.value);
            dropdown.classList.add('mp-open');
        });

        textInput.addEventListener('blur', function() {
            setTimeout(function() { dropdown.classList.remove('mp-open'); }, 180);
        });
